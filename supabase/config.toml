# =============================================
# CONFIGURAÇÃO DO SUPABASE CLI — Mecânica Pro
# =============================================
# Este arquivo é usado pelo Supabase CLI para deploy.
# Copie para supabase/config.toml e substitua o project_id.
#
# project_id: ID do projeto Supabase (encontrado no dashboard)
#
# verify_jwt = false: Desabilita verificação automática de JWT do Supabase Auth.
# Usamos validação customizada — cada Edge Function faz sua própria
# verificação via getClaims() ou validateToken().
# Se fosse true, o Supabase exigiria token do Supabase Auth antes de executar.
# =============================================

project_id = "mbdlpmngadlyexjhmhxg"

[functions.manage-appointment]
verify_jwt = false

[functions.process-message-queue]
verify_jwt = false

[functions.send-reminders]
verify_jwt = false

[functions.validate-signup]
verify_jwt = false
